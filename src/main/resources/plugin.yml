name: EnderDragonSpawnerPlugin
version: 1.12.0
main: com.codex.enddragonsafespawner.EndDragonSafeSpawnerPlugin
api-version: '1.21.11'
author: Codex
description: Spawns Ender Dragons in the End on a configurable timer without breaking blocks.
prefix: EnderDragon Spawner Plugin

commands:
  dragaoend:
    description: Configura e controla o spawn seguro do Dragao do End.
    usage: /dragaoend help
    aliases: [eds, enddragonspawn, dragao]
    permission: enddragonsafe.admin
    permission-message: "Voce nao tem permissao para usar este comando."

permissions:
  enddragonsafe.admin:
    description: Permite configurar e usar o EnderDragon Spawner Plugin.
    default: op
